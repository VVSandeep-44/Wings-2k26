<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>WINGS 2k26 - Admin Login</title>
    <style>
      :root {
        --bg: #090b17;
        --panel: #11152c;
        --panel-2: #171d3a;
        --text: #f0ecff;
        --muted: #acb4df;
        --accent: #ff2d95;
        --ok: #58daac;
        --err: #ff739c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at 20% 0%, rgba(124, 77, 255, 0.2), transparent 35%),
          radial-gradient(circle at 80% 8%, rgba(255, 45, 149, 0.2), transparent 34%),
          var(--bg);
        color: var(--text);
        padding: 16px;
      }

      .card {
        width: min(420px, 100%);
        background: var(--panel);
        border: 1px solid rgba(56, 249, 255, 0.2);
        border-radius: 14px;
        padding: 18px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 1.3rem;
      }

      p {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      input,
      button {
        width: 100%;
        border-radius: 10px;
        border: 1px solid #2f3764;
        background: var(--panel-2);
        color: var(--text);
        padding: 11px 12px;
        font-size: 0.95rem;
      }

      button {
        border: none;
        margin-top: 10px;
        cursor: pointer;
        font-weight: 700;
        background: linear-gradient(135deg, var(--accent), #7c4dff);
      }

      .password-wrap {
        position: relative;
      }

      .password-wrap input {
        padding-right: 84px;
      }

      .toggle-password {
        position: absolute;
        right: 6px;
        top: 50%;
        transform: translateY(-80%);
        width: auto;
        padding: 7px 10px;
        font-size: 0.82rem;
        border-radius: 8px;
        border: 1px solid #394071;
        background: #1f2650;
        color: var(--text);
        cursor: pointer;
      }

      .toggle-password:hover {
        filter: brightness(1.08);
      }

      .status {
        min-height: 18px;
        margin-top: 10px;
        font-size: 0.9rem;
        color: var(--muted);
      }

      .status.ok {
        color: var(--ok);
      }

      .status.err {
        color: var(--err);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Admin Login</h1>
      <p>Enter admin password to access registrations dashboard.</p>
      <div class="password-wrap">
        <input id="password" type="password" placeholder="Admin password" />
        <button
          id="togglePassword"
          type="button"
          class="toggle-password"
          aria-label="Show password"
          aria-pressed="false"
        >
          Show
        </button>
      </div>
      <button id="loginBtn">Login</button>
      <div id="status" class="status"></div>
    </div>

    <script>
      const passwordInput = document.getElementById("password");
      const togglePasswordBtn = document.getElementById("togglePassword");
      const loginBtn = document.getElementById("loginBtn");
      const statusEl = document.getElementById("status");

      const setStatus = (message, type = "") => {
        statusEl.className = `status ${type}`.trim();
        statusEl.textContent = message;
      };

      const query = new URLSearchParams(window.location.search);
      if (query.get("from") === "logout") {
        setStatus("Logged out successfully.", "ok");
      }

      const hasSession = async () => {
        const response = await fetch("/api/admin-session", {
          method: "GET",
          credentials: "same-origin",
          cache: "no-store",
        });

        return response.ok;
      };

      hasSession().then((ok) => {
        if (ok) {
          window.location.replace("/admin");
        }
      });

      const attemptLogin = async () => {
        const password = passwordInput.value.trim();

        if (!password) {
          setStatus("Please enter admin password.", "err");
          return;
        }

        setStatus("Verifying credentials...");

        try {
          const response = await fetch("/api/admin-login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "same-origin",
            body: JSON.stringify({ password }),
          });

          const result = await response.json().catch(() => ({}));

          if (!response.ok || result.success === false) {
            throw new Error(result.message || "Invalid admin password");
          }

          setStatus("Login successful. Redirecting...", "ok");
          setTimeout(() => {
            window.location.replace("/admin");
          }, 400);
        } catch (error) {
          setStatus(error.message || "Login failed.", "err");
        }
      };

      window.addEventListener("pageshow", () => {
        hasSession().then((ok) => {
          if (ok) {
            window.location.replace("/admin");
          }
        });
      });

      loginBtn.addEventListener("click", attemptLogin);
      togglePasswordBtn.addEventListener("click", () => {
        const isPassword = passwordInput.type === "password";
        passwordInput.type = isPassword ? "text" : "password";
        togglePasswordBtn.textContent = isPassword ? "Hide" : "Show";
        togglePasswordBtn.setAttribute(
          "aria-label",
          isPassword ? "Hide password" : "Show password"
        );
        togglePasswordBtn.setAttribute("aria-pressed", isPassword ? "true" : "false");
      });

      passwordInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          attemptLogin();
        }
      });
    </script>
  </body>
</html>
