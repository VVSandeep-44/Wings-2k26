<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>WINGS 2k26 - Admin Dashboard</title>
    <style>
      :root {
        --bg: #090b17;
        --panel: #11152c;
        --panel-2: #171d3a;
        --text: #f0ecff;
        --muted: #acb4df;
        --accent: #ff2d95;
        --accent2: #38f9ff;
        --ok: #58daac;
        --err: #ff739c;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at 20% 0%, rgba(124, 77, 255, 0.2), transparent 35%),
          radial-gradient(circle at 80% 8%, rgba(255, 45, 149, 0.2), transparent 34%),
          var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 24px;
      }
      .wrap {
        max-width: 1100px;
        margin: 0 auto;
      }
      .head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }
      h1 {
        margin: 0;
        font-size: 1.4rem;
      }
      .panel {
        background: var(--panel);
        border: 1px solid rgba(56, 249, 255, 0.2);
        border-radius: 14px;
        padding: 14px;
      }
      .controls-navbar {
        position: relative;
        display: grid;
        grid-template-columns: minmax(220px, 1fr) auto auto auto;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .controls-main {
        display: contents;
      }

      .controls-menu-wrap {
        position: relative;
      }

      .controls-menu {
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        width: min(340px, 92vw);
        padding: 10px;
        border-radius: 12px;
        border: 1px solid #2f3764;
        background: #111730;
        box-shadow: 0 14px 28px rgba(0, 0, 0, 0.35);
        display: none;
        grid-template-columns: 1fr;
        gap: 10px;
        z-index: 20;
      }

      .controls-menu.open {
        display: grid;
      }

      .menu-btn {
        min-width: 124px;
      }

      .logout-btn {
        background: linear-gradient(135deg, #3b1f49, #65223e);
      }
      input,
      select,
      button {
        width: 100%;
        border-radius: 10px;
        border: 1px solid #2f3764;
        background: var(--panel-2);
        color: var(--text);
        padding: 10px 12px;
        font-size: 0.95rem;
      }
      button {
        cursor: pointer;
        font-weight: 700;
        background: linear-gradient(135deg, var(--accent), #7c4dff);
        border: none;
      }
      button:hover {
        filter: brightness(1.05);
      }
      .status {
        min-height: 20px;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .status.ok {
        color: var(--ok);
      }
      .status.err {
        color: var(--err);
      }
      .table-wrap {
        overflow: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 820px;
      }
      th,
      td {
        border-bottom: 1px solid #2a3056;
        padding: 10px 8px;
        text-align: left;
        font-size: 0.9rem;
        vertical-align: top;
      }
      th {
        color: var(--accent2);
      }
      .muted {
        color: var(--muted);
      }
      .badge {
        display: inline-block;
        margin: 2px 4px 2px 0;
        padding: 3px 8px;
        border-radius: 999px;
        background: #212a53;
        color: #e8ecff;
        font-size: 0.75rem;
      }
      .meta {
        font-size: 0.82rem;
        color: var(--muted);
      }

      .head-logo {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 6px 10px;
        border-radius: 10px;
        border: 1px solid #2a3361;
        background: rgba(20, 25, 52, 0.75);
      }

      .head-logo img {
        width: 108px;
        height: auto;
        display: block;
      }

      .btn-secondary {
        background: linear-gradient(135deg, #1f2650, #2a3471);
      }

      .delete-btn {
        width: auto;
        min-width: 88px;
        padding: 8px 10px;
        font-size: 0.82rem;
        background: linear-gradient(135deg, #5a213f, #8a2b48);
      }

      .delete-btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      #searchInput {
        min-width: 0;
      }

      .empty {
        text-align: center;
        padding: 20px;
        color: var(--muted);
      }
      @media (max-width: 960px) {
        body {
          padding: 14px;
        }

        .wrap {
          max-width: 100%;
        }

        .head {
          flex-direction: column;
          align-items: flex-start;
        }

        .head-logo img {
          width: 96px;
        }

        .panel {
          padding: 12px;
        }
      }

      @media (max-width: 760px) {
        .controls-navbar {
          grid-template-columns: 1fr auto;
          grid-template-areas:
            "search search"
            "filter menu";
        }

        #searchInput {
          grid-area: search;
        }

        #eventFilter {
          grid-area: filter;
        }

        .controls-menu-wrap {
          grid-area: menu;
        }

        .logout-btn {
          grid-column: 1 / -1;
        }

        .menu-btn {
          min-width: 0;
        }

        .table-wrap {
          overflow-x: auto;
          overflow-y: hidden;
          -webkit-overflow-scrolling: touch;
          border: 1px solid #2b3360;
          border-radius: 10px;
        }

        table {
          min-width: 820px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <h1>WINGS 2k26 Admin Dashboard</h1>
        <div class="head-logo" aria-label="Pydah logo">
          <img src="assets/pydah-logo.jpeg" alt="Pydah Logo" />
        </div>
      </div>

      <div class="panel">
        <div class="controls-navbar">
          <input id="searchInput" type="text" placeholder="Search name, email, reg ID..." />
          <select id="eventFilter">
            <option value="all">All Events</option>
            <option value="cultural">Cultural</option>
            <option value="technical">Technical</option>
            <option value="sports">Sports</option>
            <option value="workshop">Workshop</option>
          </select>
          <div class="controls-menu-wrap">
            <button id="menuBtn" class="btn-secondary menu-btn" aria-expanded="false">Menu ▾</button>
            <div id="menuPanel" class="controls-menu">
              <select id="limit">
                <option value="20">Last 20</option>
                <option value="50">Last 50</option>
                <option value="100">Last 100</option>
              </select>
              <button id="refreshBtn">Refresh Data</button>
              <button id="exportCsvBtn" class="btn-secondary">Export CSV</button>
              <button id="exportExcelBtn" class="btn-secondary">Export Excel</button>
              <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>
          </div>
        </div>

        <div id="status" class="status">Enter admin password to load data.</div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Contact</th>
                <th>College</th>
                <th>Dept / Year</th>
                <th>Events</th>
                <th>Reg ID</th>
                <th>Created</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="rows">
              <tr>
                <td class="empty" colspan="9">No data loaded</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const limitInput = document.getElementById("limit");
      const searchInput = document.getElementById("searchInput");
      const eventFilterInput = document.getElementById("eventFilter");
      const refreshBtn = document.getElementById("refreshBtn");
      const menuBtn = document.getElementById("menuBtn");
      const menuPanel = document.getElementById("menuPanel");
      const logoutBtn = document.getElementById("logoutBtn");
      const exportCsvBtn = document.getElementById("exportCsvBtn");
      const exportExcelBtn = document.getElementById("exportExcelBtn");
      const statusEl = document.getElementById("status");
      const rowsEl = document.getElementById("rows");
      let allRegistrations = [];
      let latestRegistrations = [];

      const ensureAuthenticated = async () => {
        const response = await fetch("/api/admin-session", {
          method: "GET",
          credentials: "same-origin",
          cache: "no-store",
        });

        if (!response.ok) {
          window.location.replace("/admin-login");
          return false;
        }

        return true;
      };

      const setStatus = (message, type = "") => {
        statusEl.className = `status ${type}`.trim();
        statusEl.textContent = message;
      };

      const formatDate = (iso) => {
        const date = new Date(iso);
        if (Number.isNaN(date.getTime())) return "-";
        return date.toLocaleString();
      };

      const escapeHtml = (value) =>
        String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#039;");

      const renderRows = (data) => {
        latestRegistrations = data;

        if (!data.length) {
          rowsEl.innerHTML = '<tr><td class="empty" colspan="9">No registrations found</td></tr>';
          return;
        }

        rowsEl.innerHTML = data
          .map(
            (row, index) => `
              <tr>
                <td data-label="#">${index + 1}</td>
                <td data-label="Name">${row.name}</td>
                <td data-label="Contact">
                  <div>${row.email}</div>
                  <div class="muted">${row.phone}</div>
                </td>
                <td data-label="College">${row.college}</td>
                <td data-label="Dept / Year">${row.department} / ${row.year}</td>
                <td data-label="Events">${(row.events || [])
                  .map((event) => `<span class="badge">${event}</span>`)
                  .join("")}</td>
                <td data-label="Reg ID">${row.regId}</td>
                <td data-label="Created">${formatDate(row.createdAt)}</td>
                <td data-label="Actions">
                  <button
                    class="delete-btn"
                    data-delete-id="${row.id}"
                    data-delete-name="${escapeHtml(row.name)}"
                  >
                    Delete
                  </button>
                </td>
              </tr>
            `
          )
          .join("");
      };

      const deleteRegistration = async (id, name, buttonEl) => {
        const confirmed = window.confirm(
          `Delete registration for ${name || "this user"}? This cannot be undone.`
        );

        if (!confirmed) {
          return;
        }

        buttonEl.disabled = true;
        buttonEl.textContent = "Deleting...";
        setStatus("Deleting registration...");

        try {
          const response = await fetch(`/api/registrations/${id}`, {
            method: "DELETE",
            credentials: "same-origin",
            cache: "no-store",
          });

          const result = await response.json().catch(() => ({}));

          if (!response.ok || !result.success) {
            throw new Error(result.message || "Failed to delete registration");
          }

          setStatus("Registration deleted successfully.", "ok");
          await loadRegistrations();
        } catch (error) {
          buttonEl.disabled = false;
          buttonEl.textContent = "Delete";
          setStatus(error.message || "Could not delete registration.", "err");
        }
      };

      const applyFilters = () => {
        const query = searchInput.value.trim().toLowerCase();
        const selectedEvent = eventFilterInput.value;

        const filtered = allRegistrations.filter((row) => {
          const events = Array.isArray(row.events) ? row.events : [];

          const eventMatches =
            selectedEvent === "all" || events.includes(selectedEvent);

          if (!eventMatches) {
            return false;
          }

          if (!query) {
            return true;
          }

          const searchable = [
            row.name,
            row.email,
            row.phone,
            row.college,
            row.department,
            row.year,
            row.regId,
            events.join(" "),
          ]
            .join(" ")
            .toLowerCase();

          return searchable.includes(query);
        });

        renderRows(filtered);

        if (allRegistrations.length > 0) {
          setStatus(
            `Showing ${filtered.length} of ${allRegistrations.length} registration(s).`,
            "ok"
          );
        }
      };

      const loadRegistrations = async () => {
        const limit = Number(limitInput.value) || 20;

        if (!(await ensureAuthenticated())) {
          return;
        }

        setStatus("Loading registrations...");

        try {
          const response = await fetch(`/api/registrations?limit=${limit}`, {
            credentials: "same-origin",
            cache: "no-store",
          });

          const result = await response.json();

          if (!response.ok || !result.success) {
            throw new Error(result.message || "Failed to fetch registrations");
          }

          allRegistrations = result.data || [];
          applyFilters();
          setStatus(`Loaded ${result.count} registration(s).`, "ok");
        } catch (error) {
          allRegistrations = [];
          rowsEl.innerHTML = '<tr><td class="empty" colspan="9">Could not load data</td></tr>';
          setStatus(error.message || "Unexpected error occurred.", "err");
        }
      };

      const downloadFile = (content, filename, mimeType) => {
        const blob = new Blob([content], { type: mimeType });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        link.click();
        URL.revokeObjectURL(url);
      };

      const escapeCsv = (value) => {
        const text = String(value ?? "");
        if (text.includes(",") || text.includes("\n") || text.includes('"')) {
          return `"${text.replace(/"/g, '""')}"`;
        }
        return text;
      };

      const buildCsv = (rows) => {
        const headers = [
          "Name",
          "Email",
          "Phone",
          "College",
          "Department",
          "Year",
          "Events",
          "Registration ID",
          "Created At",
        ];

        const lines = [headers.join(",")];

        rows.forEach((row) => {
          lines.push(
            [
              escapeCsv(row.name),
              escapeCsv(row.email),
              escapeCsv(row.phone),
              escapeCsv(row.college),
              escapeCsv(row.department),
              escapeCsv(row.year),
              escapeCsv((row.events || []).join(" | ")),
              escapeCsv(row.regId),
              escapeCsv(formatDate(row.createdAt)),
            ].join(",")
          );
        });

        return lines.join("\n");
      };

      const exportRegistrations = (type) => {
        if (!latestRegistrations.length) {
          setStatus("Load registrations before exporting.", "err");
          return;
        }

        const csvContent = buildCsv(latestRegistrations);
        const stamp = new Date().toISOString().slice(0, 10);

        if (type === "excel") {
          downloadFile(csvContent, `wings-registrations-${stamp}.xls`, "application/vnd.ms-excel;charset=utf-8;");
          setStatus("Excel export downloaded.", "ok");
          return;
        }

        downloadFile(csvContent, `wings-registrations-${stamp}.csv`, "text/csv;charset=utf-8;");
        setStatus("CSV export downloaded.", "ok");
      };

      refreshBtn.addEventListener("click", loadRegistrations);
      exportCsvBtn.addEventListener("click", () => exportRegistrations("csv"));
      exportExcelBtn.addEventListener("click", () => exportRegistrations("excel"));
      searchInput.addEventListener("input", applyFilters);
      eventFilterInput.addEventListener("change", applyFilters);
      limitInput.addEventListener("change", loadRegistrations);

      rowsEl.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-delete-id]");

        if (!button) {
          return;
        }

        const id = Number(button.dataset.deleteId);
        const name = button.dataset.deleteName || "registrant";

        if (!id) {
          setStatus("Invalid registration id.", "err");
          return;
        }

        deleteRegistration(id, name, button);
      });

      logoutBtn.addEventListener("click", async () => {
        logoutBtn.disabled = true;
        logoutBtn.textContent = "Logging out...";

        try {
          await fetch("/api/admin-logout", {
            method: "POST",
            credentials: "same-origin",
            cache: "no-store",
          });
        } finally {
          window.location.replace("/admin-login?from=logout");
        }
      });

      window.addEventListener("pageshow", async () => {
        const ok = await ensureAuthenticated();
        if (!ok) {
          return;
        }
        loadRegistrations();
      });

      menuBtn.addEventListener("click", () => {
        const isOpen = menuPanel.classList.toggle("open");
        menuBtn.setAttribute("aria-expanded", isOpen);
        menuBtn.textContent = isOpen ? "Menu ▴" : "Menu ▾";
      });

      document.addEventListener("click", (event) => {
        if (!menuPanel.contains(event.target) && !menuBtn.contains(event.target)) {
          menuPanel.classList.remove("open");
          menuBtn.setAttribute("aria-expanded", "false");
          menuBtn.textContent = "Menu ▾";
        }
      });

      ensureAuthenticated().then((ok) => {
        if (ok) {
          loadRegistrations();
        }
      });
    </script>
  </body>
</html>
